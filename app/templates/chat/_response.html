<div class="space-y-3">
  <div class="text-xs font-medium text-gray-500">
    <span class="text-gray-400">Pregunta:</span> {{ question }}
  </div>

  <div class="prose prose-sm max-w-none text-gray-800 text-sm leading-relaxed bg-gray-50 rounded-lg p-3 border border-gray-200">
    {{ answer | replace('\n', '<br>') | safe }}
  </div>

  {% if sources %}
  <div>
    <p class="text-xs font-medium text-gray-500 mb-1.5">Fuentes:</p>
    <div class="space-y-1">
      {% for source in sources %}
      <a href="/documents/{{ source.id }}/download"
         class="flex items-center gap-2 text-xs text-indigo-600 hover:text-indigo-800 hover:bg-indigo-50 px-2 py-1.5 rounded transition-colors">
        <svg class="w-3 h-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        <span>{{ source.title }}</span>
        {% if source.department %}<span class="text-gray-400">· {{ source.department }}</span>{% endif %}
      </a>
      {% endfor %}
    </div>
  </div>
  {% endif %}

  <hr class="border-gray-200" />
</div>
