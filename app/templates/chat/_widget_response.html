<div class="space-y-1.5">
  <div class="flex gap-2">
    <div class="w-5 h-5 rounded-full bg-gray-100 flex items-center justify-center shrink-0 mt-0.5">
      <svg class="w-3 h-3 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
    </div>
    <p class="text-xs text-gray-500 bg-gray-100 rounded-xl rounded-tl-none px-3 py-2 leading-relaxed max-w-[85%]">
      {{ question }}
    </p>
  </div>

  <div class="flex gap-2 justify-start">
    <div class="w-5 h-5 rounded-full bg-indigo-600 flex items-center justify-center shrink-0 mt-0.5">
      <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
      </svg>
    </div>
    <div class="max-w-[85%] space-y-1.5">
      <p class="text-xs text-gray-800 bg-indigo-50 rounded-xl rounded-tl-none px-3 py-2 leading-relaxed">
        {{ answer | replace('\n', '<br>') | safe }}
      </p>
      {% if sources %}
      <div class="flex flex-wrap gap-1 px-1">
        {% for source in sources %}
        <a href="/documents/{{ source.id }}/view"
           target="_blank" rel="noopener"
           class="text-xs text-indigo-600 bg-white border border-indigo-200 hover:bg-indigo-50 px-2 py-0.5 rounded-full transition-colors truncate max-w-[140px]">
          {{ source.title }}
        </a>
        {% endfor %}
      </div>
      {% endif %}
    </div>
  </div>
</div>
