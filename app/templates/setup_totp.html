{% extends "base.html" %}
{% block title %}Configurar 2FA{% endblock %}

{% block content %}
<div class="flex-1 overflow-y-auto p-8 flex items-center justify-center">
  <div class="max-w-md w-full bg-white rounded-xl shadow-sm border border-gray-200 p-6">
    <h1 class="text-xl font-bold text-gray-900 mb-2">Configurar autenticación de dos factores</h1>
    <p class="text-sm text-gray-500 mb-6">Escanea el código QR con tu app de autenticación (Google Authenticator, Authy, etc.)</p>

    <div class="flex justify-center mb-6">
      <img src="data:image/png;base64,{{ qr_b64 }}" alt="QR Code" class="w-48 h-48 rounded-lg border border-gray-200" />
    </div>

    <details class="mb-4">
      <summary class="text-xs text-gray-400 cursor-pointer hover:text-gray-600">Clave manual</summary>
      <code class="block mt-2 text-xs font-mono text-gray-600 bg-gray-50 p-2 rounded break-all">{{ secret }}</code>
    </details>

    <form method="post" action="/auth/totp/setup" class="space-y-4">
      <input type="hidden" name="secret" value="{{ secret }}" />
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Código de verificación</label>
        <input
          type="text"
          name="code"
          inputmode="numeric"
          pattern="\d{6}"
          maxlength="6"
          required
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500 text-sm tracking-widest text-center"
          placeholder="000000"
        />
      </div>
      <button type="submit" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-sm font-medium transition-colors">
        Activar 2FA
      </button>
    </form>
  </div>
</div>
{% endblock %}
