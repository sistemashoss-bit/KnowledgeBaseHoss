<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-900">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verificación 2FA — Knowledge Base</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="w-14 h-14 mx-auto bg-indigo-600/20 rounded-full flex items-center justify-center mb-4">
        <svg class="w-7 h-7 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
      </div>
      <h1 class="text-xl font-bold text-white">Verificación en dos pasos</h1>
      <p class="mt-1 text-slate-400 text-sm">Ingresa el código de tu app de autenticación</p>
    </div>

    {% if error %}
    <div class="mb-4 px-4 py-3 bg-red-500/10 border border-red-500/30 rounded-lg text-red-400 text-sm">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/auth/totp" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1">Código de autenticación</label>
        <input type="text" name="code" required
               inputmode="numeric" pattern="\d{6}" maxlength="6" autofocus
               class="w-full px-3 py-3 bg-slate-800 border border-slate-600 rounded-lg text-white text-center text-2xl font-mono tracking-[0.4em] placeholder-slate-600 focus:outline-none focus:border-indigo-500"
               placeholder="000000" />
        <p class="mt-1 text-xs text-slate-500">El código cambia cada 30 segundos</p>
      </div>

      <button type="submit"
              class="w-full py-2.5 px-4 bg-indigo-600 hover:bg-indigo-500 text-white font-medium rounded-lg transition-colors text-sm">
        Verificar
      </button>
    </form>

    <p class="mt-4 text-center">
      <a href="/auth/login" class="text-slate-400 hover:text-slate-300 text-sm">← Volver al inicio de sesión</a>
    </p>
  </div>
</body>
</html>
