<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-900">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — Knowledge Base</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <img src="https://hoss.com.mx/cdn/shop/files/LOGO_FINAL_VARIANTES_Mesa_de_trabajo_1-04_260x.png?v=1674512695"
           alt="HOSS" class="h-12 w-auto object-contain mx-auto brightness-0 invert" />
      <p class="mt-4 text-slate-400 text-sm">Accede con tus credenciales</p>
    </div>

    {% if error %}
    <div class="mb-4 px-4 py-3 bg-red-500/10 border border-red-500/30 rounded-lg text-red-400 text-sm">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/auth/login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1">Correo electrónico</label>
        <input type="email" name="email" required autocomplete="email"
               class="w-full px-3 py-2 bg-slate-800 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-indigo-500 text-sm"
               placeholder="usuario@empresa.com" />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1">Contraseña</label>
        <input type="password" name="password" required autocomplete="current-password"
               class="w-full px-3 py-2 bg-slate-800 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-indigo-500 text-sm"
               placeholder="••••••••" />
      </div>

      <button type="submit"
              class="w-full py-2.5 px-4 bg-indigo-600 hover:bg-indigo-500 text-white font-medium rounded-lg transition-colors text-sm">
        Iniciar sesión
      </button>
    </form>

    {% if not has_users %}
    <p class="mt-4 text-center text-slate-400 text-sm">
      ¿Primera vez?
      <a href="/auth/register" class="text-indigo-400 hover:text-indigo-300">Crear cuenta</a>
    </p>
    {% endif %}
  </div>
</body>
</html>
