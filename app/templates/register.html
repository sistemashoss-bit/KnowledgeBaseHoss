<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-900">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta — Knowledge Base</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <span class="text-4xl">📚</span>
      <h1 class="mt-3 text-2xl font-bold text-white">Crear cuenta</h1>
      <p class="mt-1 text-slate-400 text-sm">El primer registro se convierte en superadmin</p>
    </div>

    {% if error %}
    <div class="mb-4 px-4 py-3 bg-red-500/10 border border-red-500/30 rounded-lg text-red-400 text-sm">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/auth/register" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1">Correo electrónico</label>
        <input
          type="email"
          name="email"
          required
          autocomplete="email"
          class="w-full px-3 py-2 bg-slate-800 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-indigo-500 text-sm"
          placeholder="usuario@empresa.com"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1">Contraseña</label>
        <input
          type="password"
          name="password"
          required
          minlength="8"
          autocomplete="new-password"
          class="w-full px-3 py-2 bg-slate-800 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-indigo-500 text-sm"
          placeholder="Mínimo 8 caracteres"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1">Confirmar contraseña</label>
        <input
          type="password"
          name="password_confirm"
          required
          minlength="8"
          autocomplete="new-password"
          class="w-full px-3 py-2 bg-slate-800 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-indigo-500 text-sm"
          placeholder="Repite la contraseña"
        />
      </div>

      <button
        type="submit"
        class="w-full py-2.5 px-4 bg-indigo-600 hover:bg-indigo-500 text-white font-medium rounded-lg transition-colors text-sm"
      >
        Crear cuenta
      </button>
    </form>

    <p class="mt-4 text-center text-slate-400 text-sm">
      ¿Ya tienes cuenta?
      <a href="/auth/login" class="text-indigo-400 hover:text-indigo-300">Iniciar sesión</a>
    </p>
  </div>
</body>
</html>
